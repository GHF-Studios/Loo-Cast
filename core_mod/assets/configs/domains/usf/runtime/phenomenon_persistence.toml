[usf.runtime.phenomenon_persistence]
enabled = true
persistence_dir = "target/usf_demo/phenomena_authority"
async_write_enabled = true
async_write_batch_size = 256
max_queued_records_soft = 4096
durability = "atomic_replace"
journal_enabled = true
journal_dir = "target/usf_demo/phenomena_authority/journal"
retain_successful_journal_batches = false
