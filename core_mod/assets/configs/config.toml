[camera]
default_zoom = 0.15
min_zoom = 0.000001
max_zoom = 1000000.0
base_zoom_speed = 10.0
follow_smoothness = 0.15

[chunk]
z_offset = -10
texture_generator_shader = "texture_generators/example_world"

[chunk_loader]
load_radius = 2
zoom_cooldown_secs = 1.0

[core]
cli_log_filter = "warn"

[debug.gizmo]
arrow_length = 128.0
arrow_thickness = 12.0
drag_speed = 64.0
z_offset = 20.0 # For good measure, we pretty much always want gizmos on top of everything else.

[entity]
reservation_buffer_size = 8

[gpu.texture_generator]
workgroups_x = 16
workgroups_y = 16

[log.tracing]
enabled = true

[player]
base_size = 32.0
base_movement_speed = 50.0
sprint_multiplier = 2.5
z_offset = 10.0 # For good measure, we pretty much always want gizmos on top of everything else.

[rhai_binding]
testing_enabled = false

[time]
start_paused = false
start_step_secs = 0.02

[usf.pos]
origin_offset_threshold = 10

[utils.premium_box]
success_logging_enabled = false

[workflow]
timeout_frames_per_stage = 30
max_retries = 5
runner_logging_blacklist = "Chunk::*"
