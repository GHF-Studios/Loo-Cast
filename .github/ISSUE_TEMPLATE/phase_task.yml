name: Phase Task
description: Track one concrete task under a phase milestone
title: "Phase Task: "
labels:
  - "type:phase-task"
body:
  - type: markdown
    attributes:
      value: |
        Keep this concise and execution-focused.
        Phase authority lives in the milestone description.
        Until metadata automation exists, manually apply the matching `phase:N` label after issue creation.
  - type: dropdown
    id: phase
    attributes:
      label: Phase
      description: Used for manual `phase:N` labeling until automation is added.
      options:
        - Phase 0
        - Phase 1
        - Phase 2
        - Phase 3
        - Phase 4
        - Phase 5
        - Phase 6
        - Phase 7
        - Phase 8
        - Phase 9
    validations:
      required: true
  - type: textarea
    id: intent
    attributes:
      label: Intent
      description: What this task achieves and why it matters.
      placeholder: 1-3 short lines.
    validations:
      required: true
  - type: textarea
    id: in_scope
    attributes:
      label: In Scope
      description: Concrete checks or outcomes for this task.
      placeholder: |
        - [ ] Outcome 1
        - [ ] Outcome 2
    validations:
      required: true
  - type: textarea
    id: linked_context
    attributes:
      label: Linked Context (Optional)
      description: Related issues/PRs/docs for context.
      placeholder: |
        - Issue:
        - PR:
        - Doc:
    validations:
      required: false
  - type: textarea
    id: out_of_scope
    attributes:
      label: Out of Scope (Optional)
      placeholder: |
        - Non-goal 1
        - Non-goal 2
    validations:
      required: false
  - type: textarea
    id: exit_criteria
    attributes:
      label: Exit Criteria (Optional)
      description: Keep this simple unless extra conditions are needed.
      value: |
        - [ ] Address all linked issues
    validations:
      required: false
