name: Phase Gate Issue
description: Record the final decision for a phase
title: "Phase N Gate"
labels:
  - "type:phase-gate"
body:
  - type: markdown
    attributes:
      value: |
        This is the canonical final decision record for a phase.
        Keep this short. Do not duplicate the full tracking issue.
        Any gate note copied to the tracking issue is a mirror only.
        After creation, manually apply the matching `phase:N` label.
  - type: dropdown
    id: phase
    attributes:
      label: Phase
      options:
        - Phase 0
        - Phase 1
        - Phase 2
        - Phase 3
        - Phase 4
        - Phase 5
    validations:
      required: true
  - type: input
    id: tracking_issue_link
    attributes:
      label: Tracking Issue Link
      description: Link to the phase tracking issue.
      placeholder: "#123"
    validations:
      required: true
  - type: textarea
    id: decision
    attributes:
      label: Decision
      description: Final phase decision.
      placeholder: |
        go / conditional go / hold / recycle
    validations:
      required: true
  - type: textarea
    id: required_evidence
    attributes:
      label: Required Evidence
      description: Bare links/references only; do not repeat issue or PR titles.
      placeholder: |
        - Tracking issue: #123
        - Child issues: #124, #125
        - PRs/commits: PR #126
        - Validation: <link or n/a>
        - Docs: <path or n/a>
    validations:
      required: true
  - type: textarea
    id: waivers_and_deferred_items
    attributes:
      label: Waivers / Deferred Items
      description: For anything not fully complete, include rationale, owner, and target phase/backlog bucket.
      placeholder: |
        - Item:
          - Rationale:
          - Owner:
          - Target:
    validations:
      required: false
  - type: textarea
    id: gate_decision_note
    attributes:
      label: Final Note
      description: Short final note. Explicitly name the unlocked next phase when applicable.
      placeholder: "Phase X complete. Unlock Phase Y."
    validations:
      required: true
