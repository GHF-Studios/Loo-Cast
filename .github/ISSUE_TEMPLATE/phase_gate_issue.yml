name: Phase Gate Issue
description: Close a phase with required evidence and unlock the next phase
title: "Phase N Gate: Complete"
labels:
  - "type:phase-gate"
body:
  - type: markdown
    attributes:
      value: |
        This is the canonical gate decision record for a phase.
        Any gate note copied to the tracking issue is a mirror only.
  - type: dropdown
    id: phase
    attributes:
      label: Phase
      options:
        - Phase 0
        - Phase 1
        - Phase 2
        - Phase 3
        - Phase 4
        - Phase 5
    validations:
      required: true
  - type: input
    id: tracking_issue_link
    attributes:
      label: Tracking Issue Link
      description: Link to the phase tracking issue.
      placeholder: https://github.com/OWNER/REPO/issues/123
    validations:
      required: true
  - type: textarea
    id: closed_child_issues
    attributes:
      label: Closed Child Issues
      description: Links to all closed phase task issues.
      placeholder: |
        - #123
        - #124
    validations:
      required: true
  - type: textarea
    id: implementation_artifacts
    attributes:
      label: Implementation Artifacts
      description: PR/commit links.
      placeholder: |
        - PR: <link>
        - Commit: <link>
    validations:
      required: true
  - type: textarea
    id: validation_artifacts
    attributes:
      label: Validation Artifacts
      description: CI runs, test outputs, benchmark links when required.
      placeholder: |
        - CI: <link>
        - Tests: <link>
        - Benchmarks: <link or n/a>
    validations:
      required: true
  - type: textarea
    id: documentation_updates
    attributes:
      label: Documentation Updates
      description: Links to docs changed in this phase.
      placeholder: |
        - docs/path.md
        - docs/another-path.md
    validations:
      required: true
  - type: textarea
    id: waivers_and_deferred_items
    attributes:
      label: Waivers / Deferred Items
      description: For anything not fully complete, include rationale, owner, and target phase/backlog bucket.
      placeholder: |
        - Item:
          - Rationale:
          - Owner:
          - Target:
    validations:
      required: false
  - type: textarea
    id: gate_decision_note
    attributes:
      label: Gate Decision Note
      description: Confirm completion and explicitly name the unlocked next phase.
      placeholder: "Phase X complete. Unlock Phase Y."
    validations:
      required: true
