name: Audit

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    name: cargo xtask audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: loo_cast_alpha
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install system build tools
        run: sudo apt-get update && sudo apt-get install -y clang mold

      - name: Install Rust toolchain
        run: |
          rustup toolchain install nightly --profile minimal --component rustfmt,clippy
          rustup component add rustc-codegen-cranelift-preview --toolchain nightly

      - name: Restore Cargo cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            loo_cast_alpha/target
          key: cargo-${{ runner.os }}-${{ hashFiles('loo_cast_alpha/rust-toolchain.toml', 'loo_cast_alpha/.cargo/config.toml', 'loo_cast_alpha/Cargo.lock', 'loo_cast_alpha/Cargo.toml', 'loo_cast_alpha/crates/*/Cargo.toml') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: Run audit
        run: cargo xtask audit
